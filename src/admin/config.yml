backend:
  name: github
  repo: IBSS0090/-white-corner-boxing
  branch: main
  base_url: https://white-corner-boxing.netlify.app
  auth_endpoint: /api/auth

# where uploaded photos are stored / referenced
media_folder: "src/assets"
public_folder: "/assets"

# make a commit message that reads nicely in the repo history
site_url: https://white-corner-boxing.netlify.app
display_url: https://white-corner-boxing.netlify.app

collections:
  - name: blog
    label: "Blog Posts"
    label_singular: "Blog Post"
    description: "Write, edit, add or remove blog articles."
    folder: "src/blog"
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{order}}-{{slug}}"
    sortable_fields: ["order", "title"]
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: tag, label: "Category tag (e.g. Technique)", widget: string }
      - { name: teaser, label: "Short teaser (shown on the card)", widget: text }
      - { name: order, label: "Order on the page (1 = first)", widget: number, default: 99, value_type: int }
      - { name: body, label: "Article", widget: markdown }

  - name: homepage
    label: "Homepage — Hero & Timings"
    description: "The big headline text on the two video corners, and the session timings line."
    files:
      - name: homepage
        label: "Hero & timings"
        file: "src/_data/homepage.json"
        fields:
          - label: "Session timings"
            name: hours
            widget: object
            fields:
              - { name: morning, label: "Morning hours", widget: string }
              - { name: evening, label: "Evening hours", widget: string }
              - { name: kidsNote, label: "Kids-only note", widget: string }
          - label: "Hero — Red Corner"
            name: hero
            widget: object
            fields:
              - label: "Red corner"
                name: red
                widget: object
                fields:
                  - { name: l1, label: "Headline line 1", widget: string }
                  - { name: l2, label: "Headline line 2", widget: string }
                  - { name: badge, label: "Small badge text", widget: string }
                  - { name: sub, label: "Paragraph (use <b>text</b> for bold)", widget: text }
              - label: "Blue corner"
                name: blue
                widget: object
                fields:
                  - { name: l1, label: "Headline line 1", widget: string }
                  - { name: l2, label: "Headline line 2", widget: string }
                  - { name: badge, label: "Small badge text", widget: string }
                  - { name: sub, label: "Paragraph (use <b>text</b> for bold)", widget: text }

  - name: pricing
    label: "Membership Pricing"
    description: "Edit plan names, prices and rows."
    files:
      - name: pricing
        label: "Pricing plans"
        file: "src/_data/pricing.json"
        fields:
          - name: plans
            label: "Plans"
            label_singular: "Plan"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Plan name", widget: string }
              - { name: sub, label: "Subtitle (e.g. 18 years +)", widget: string }
              - { name: featured, label: "Highlight this plan?", widget: boolean, default: false }
              - { name: tag, label: "Corner label (e.g. Most Popular) — blank for none", widget: string, required: false, default: "" }
              - name: rows
                label: "Price rows"
                label_singular: "Row"
                widget: list
                summary: "{{fields.label}} — {{fields.price}}"
                fields:
                  - { name: label, label: "What (e.g. 3 Months)", widget: string }
                  - { name: price, label: "Price (e.g. ₹7,999)", widget: string }
                  - { name: best, label: "Mark as best value?", widget: boolean, default: false }

  - name: branches
    label: "Branch Addresses"
    description: "Names, addresses and map location for your branches (updates the map, footer and FAQ)."
    files:
      - name: branches
        label: "Branches"
        file: "src/_data/branches.json"
        fields:
          - name: branches
            label: "Branches"
            label_singular: "Branch"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Branch name", widget: string }
              - { name: sub, label: "Tagline (e.g. Main Branch)", widget: string }
              - { name: address, label: "Full address", widget: text }
              - { name: mapsQuery, label: "Google Maps search text (Directions button)", widget: string }
              - { name: lat, label: "Map latitude", widget: number, value_type: float }
              - { name: lng, label: "Map longitude", widget: number, value_type: float }

  - name: programs
    label: "Training Programs"
    files:
      - name: programs
        label: "Programs"
        file: "src/_data/programs.json"
        fields:
          - name: programs
            label: "Programs"
            label_singular: "Program"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: num, label: "Number (01, 02 ...)", widget: string }
              - { name: icon, label: "Icon (emoji)", widget: string }
              - { name: title, label: "Program name", widget: string }
              - { name: tagline, label: "Tagline", widget: string }
              - name: points
                label: "Bullet points"
                widget: list
                field: { name: point, label: "Point", widget: string }

  - name: coaches
    label: "Coaches Roster"
    files:
      - name: coaches
        label: "Roster"
        file: "src/_data/coaches.json"
        fields:
          - name: roster
            label: "Coaches"
            label_singular: "Coach"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: role, label: "Role (e.g. Coach)", widget: string }

  - name: events
    label: "Events"
    files:
      - name: events
        label: "Event series"
        file: "src/_data/events.json"
        fields:
          - name: events
            label: "Events"
            label_singular: "Event"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: kind, label: "Kind (e.g. Amateur Series)", widget: string }
              - { name: icon, label: "Icon (emoji)", widget: string }
              - { name: title, label: "Title", widget: string }
              - { name: desc, label: "Description (use <b>text</b> for bold)", widget: text }
              - { name: status, label: "Status line (e.g. Series 3 announced)", widget: string }

  - name: testimonials
    label: "Testimonials"
    files:
      - name: testimonials
        label: "Reviews"
        file: "src/_data/testimonials.json"
        fields:
          - name: reviews
            label: "Reviews"
            label_singular: "Review"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Member name", widget: string }
              - { name: text, label: "Review", widget: text }

  - name: contact
    label: "Contact & Register Link"
    description: "Your phone, email and Register-Now form link. Changing these updates them everywhere on the site."
    files:
      - name: contact
        label: "Contact details"
        file: "src/_data/site.json"
        fields:
          - { name: phone, label: "Phone / WhatsApp number (with 91, no spaces or +)", widget: string, hint: "Example: 919564073380" }
          - { name: email, label: "Contact email", widget: string }
          - { name: formUrl, label: "Register Now — Google Form link", widget: string, hint: "Paste the whole https:// link" }

  - name: gallery
    label: "Photo Gallery"
    description: "Add, remove, reorder or re-caption the gallery photos."
    files:
      - name: gallery
        label: "Gallery photos"
        file: "src/_data/gallery.json"
        fields:
          - name: images
            label: "Photos"
            label_singular: "Photo"
            widget: list
            summary: "{{fields.category}} — {{fields.image}}"
            fields:
              - { name: image, label: "Photo", widget: image }
              - name: category
                label: "Category"
                widget: select
                options: ["Sparring", "The Gym", "Equipment", "Community", "Achievements", "Coaches", "Kids", "Training", "Women"]
